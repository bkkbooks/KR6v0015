body:
  text: 佛初築塔時人眾如恒沙辟支作寺主普賢作維那藥王作都講文殊講法華若無三惡道地獄生蓮花種種布施皆所得人為金剛身讀五遍意欲遠行讀六遍道路險阻讀七遍扭解枷鎖讀千遍即得解脫東方善寂如來南方廣諸菩薩西方利廣紫金北方利廣轉經上方香清菩薩下方利形像天公何物造融銅作樑柱象牙作佛屋星宿作爵台日月作繚窗堪度萬萬九千年更有餘里別有蚰蜒蚰蜒東海喻若太山入海採寶隨其多少皆得重來入山取材隨其多少亦得重皈此經雖小多有威神亦勝法華亦勝涅槃亦勝雜經誰能抄此經者手上螺文成誰能看此經眼中重光生誰能聽此經歷劫大聰明多造金經大罪得除小罪得滅或墮刀山刀山自缺或墮劍樹劍樹摧折或墮地獄地獄崩滅清清靈靈手把金經聲氣朗朗直入講堂白銀為壁水銀為地前坐金牀手憑玉把手把金經共佛說言憶佛如憶食念佛如念命日讀七遍除罪一千萬萬劫得成佛道錄文完
