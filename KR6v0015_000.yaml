front:
  text: 天公經整理者方廣錩題解天公經中國人所撰佛教經典作者不詳一卷本經篇幅甚短僅三百字左右但自稱此經雖小大有威神亦等法華亦等涅槃亦勝雜經並稱誰能抄此經手中螺文成誰能看此經眼中重光生誰能誦此經歷劫大聰明最後並稱一日念五遍除罪一千五百萬劫皆得成佛道本經若干內容係據觀世音經及淨土經典敷衍而成文內螺文重光等提法均為中國傳統的聖人之相由此證實本經確為中國人所撰現在敦煌遺書中存有三件為收藏於中國北京圖書館的北新號首尾完整北鳥號首略殘尾存與收藏於英國大英圖書館之斯號首尾完整約係歸義軍時期抄本但三件文獻的內容互有參差顯然是在傳抄過程中形成的不同異本三件敦煌遺書均無序分與流通分但北新號存首尾題北鳥號僅殘首題與前三行上半行由此可知該經全文應已大體完具斯號雖亦有首尾題但開頭文字突兀而起顯係缺漏首部經文本經最早見錄於隋法經錄卷四判為偽經其後諸經錄均有著錄又開元錄卷十八著錄偽經佛初置塔經一種下註今疑是法經錄中天公經異名而今北新號的開頭正有佛初築塔時云云證明該經應是法經錄及開元錄著錄的天公經或佛初置塔經本經未為我國歷代大藏經所收於敦煌出土後日本大正藏據斯號錄文後收入第卷但錄文略有誤今將三異本分別錄文以供研究底校本情況如下錄文一底本北新號錄文二底本斯號錄文三底本北鳥號縮微膠卷號北均無校本上述三號文字錯訛變形較多為避文繁一般不出註相關處必要時以三號互校隨文說明錄文一
